apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wordpress-org1-prod
  namespace: argocd
spec:
  project: default
  sources:
    - path: bitnamicharts/nginx
      repoURL: registry-1.docker.io
      targetRevision: 1.16.1
      helm:
        valueFiles:
          - $values/apps/org1/org1-prod-values.yaml

    - repoURL: https://github.com/el7-7/argo-demo.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: org1-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
