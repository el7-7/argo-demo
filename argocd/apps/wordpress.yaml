apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wordpress-org1
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: registry-1.docker.io/bitnamicharts
      chart: wordpress
      targetRevision: 30.0.4
      helm:
      # Reference values files relative to the chart path
        valueFiles:
          - $values/apps/org1/org1-prod-values.yaml
    - repoURL: https://github.com/el7-7/argo-demo.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: org1
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
