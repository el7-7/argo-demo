apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-org1-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: nginx
    targetRevision: 15.14.0
  destination:
    server: https://kubernetes.default.svc
    namespace: org1-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
