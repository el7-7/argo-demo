apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wordpress-org1-prod
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: registry-1.docker.io
      path: bitnamicharts/nginx
      targetRevision: 1.16.1
    - repoURL: https://github.com/el7-7/argo-demo.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: org1-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
