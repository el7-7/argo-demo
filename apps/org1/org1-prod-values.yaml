wordpressUsername: admin
wordpressPassword: password123
wordpressEmail: admin@example.com
wordpressBlogName: "My Test Site with Argo"
wordpressBlogDescription: "Testing Argo deployments"

service:
  type: ClusterIP   # 👈 important: NOT LoadBalancer

ingress:
  enabled: true
  ingressClassName: nginx
  hostname: argo.test.com
  path: /
  pathType: Prefix

mariadb:
  enabled: true
  image:
    registry: docker.io
    repository: bitnami/mariadb
    tag: 11.4.3-debian-12-r0
  auth:
    database: wordpress

persistence:
  enabled: true
  size: 10Gi
